<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KEE | Creative Software Engineer & Frontend Technologist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.background = '#842A3B';
        div.style.color = '#F5DAA7';
        div.style.padding = '32px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.overflow = 'auto';
        div.style.textAlign = 'left';
        div.innerHTML = '<h1 style="font-size:24px;margin-bottom:16px;">[SYSTEM CRASH DETECTED]</h1>' + 
                        '<p><strong>Message:</strong> ' + message + '</p>' +
                        '<p><strong>Source:</strong> ' + source + '</p>' +
                        '<p><strong>Line:</strong> ' + lineno + ':' + colno + '</p>' +
                        '<pre style="background:rgba(0,0,0,0.25);padding:16px;border-radius:8px;margin-top:16px;">' + (error && error.stack || 'No stack trace') + '</pre>';
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.background = '#842A3B';
        div.style.color = '#F5DAA7';
        div.style.padding = '32px';
        div.style.zIndex = '999999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.overflow = 'auto';
        div.style.textAlign = 'left';
        div.innerHTML = '<h1 style="font-size:24px;margin-bottom:16px;">[UNHANDLED PROMISE REJECTION]</h1>' + 
                        '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
                        '<pre style="background:rgba(0,0,0,0.25);padding:16px;border-radius:8px;margin-top:16px;">' + (event.reason && event.reason.stack || 'No stack trace') + '</pre>';
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body class="bg-[#F5EFFF] text-[#1C1635] font-sans antialiased overflow-x-hidden select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
